name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test
        run: dotnet test --no-build --verbosity normal

  build-docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: docker build -t ghcr.io/breelatimer/waystar-demo:latest ./WaystarDemo

      - name: Push Docker image
        run: docker push ghcr.io/breelatimer/waystar-demo:latest

    trigger-harness:
      needs: build-docker
      runs-on: ubuntu-latest
      steps:
        - name: Trigger Harness Deployment
          run: |
            curl -X POST \
              https://app.harness.io/pipeline/api/pipeline/execute/${{ secrets.HARNESS_PIPELINE_ID }}?accountIdentifier=FsykwSfKQyqpQywgVsF4pw&orgIdentifier=default&projectIdentifier=default_project \
              -H "x-api-key: ${{ secrets.HARNESS_API_KEY }}" \
              -H "Content-Type: application/yaml" \
              --data-raw 'pipeline: {}'